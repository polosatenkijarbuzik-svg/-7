name: Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security:
    runs-on: ubuntu-latest
    outputs:
      trivy_status: ${{ steps.trivy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t my-app:latest .
      - name: Run Trivy vulnerability scanner
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:latest'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Set status output
        run: echo "status=${{ steps.trivy.outcome }}" >> $GITHUB_OUTPUT

  publish:
    needs: security
    if: needs.security.outputs.trivy_status == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t my-app:latest .
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Tag and push
        run: |
          docker tag my-app:latest ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest
